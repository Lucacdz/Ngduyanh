<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background:#87CEEB; font-family: sans-serif; }
  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
    background: white; border-radius: 50%; transform: translate(-50%, -50%);
    pointer-events: none; mix-blend-mode: difference; z-index: 5;
  }
  #hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: white; background: rgba(0,0,0,0.5); padding: 8px 14px; border-radius: 8px;
    font-size: 13px; z-index: 5; text-align: center; line-height: 1.5;
  }
  #hotbar {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 5;
  }
  .slot {
    width: 40px; height: 40px; border: 2px solid #fff8; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; box-sizing: border-box;
  }
  .slot.active { border-color: #fff; }
  #healthContainer {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
  }
  #healthIcon { font-size: 20px; }
  #healthBarBg {
    width: 160px; height: 16px; background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; overflow: hidden;
  }
  #healthBarFill {
    height: 100%; width: 100%; background: linear-gradient(90deg,#ff4d4d,#e60000);
    transition: width 0.2s ease;
  }
  #healthText {
    color: white; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000;
  }
  #blocker {
    position: absolute; inset: 0; background: rgba(0,0,0,0.6); color: white;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer; z-index: 10; text-align: center;
  }

  /* ----- Điều khiển mobile ----- */
  #mobileControls { display: none; }
  #lookArea {
    position: absolute; right: 0; top: 0; width: 55%; height: 100%; z-index: 3;
    touch-action: none;
  }
  #joystickBase {
    position: absolute; left: 26px; bottom: 26px; width: 120px; height: 120px;
    border-radius: 50%; background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.45); z-index: 6; touch-action: none;
  }
  #joystickKnob {
    position: absolute; left: 35px; top: 35px; width: 50px; height: 50px;
    border-radius: 50%; background: rgba(255,255,255,0.65); pointer-events: none;
  }
  .actionBtn {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5); color: white; z-index: 6;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold; user-select: none; touch-action: none;
  }
  #jumpBtn   { right: 26px; bottom: 26px;  width: 72px; height: 72px; }
  #breakBtn  { right: 118px; bottom: 100px; width: 60px; height: 60px; }
  #placeBtn  { right: 26px; bottom: 118px; width: 60px; height: 60px; }

  /* ----- Cài đặt độ nhạy ----- */
  #settingsBtn {
    position: absolute; top: 14px; right: 14px; z-index: 7;
    width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.5); color: white; font-size: 18px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  #settingsPanel {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 9; color: white; align-items: center; justify-content: center;
  }
  #settingsPanel .box {
    background: rgba(30,30,30,0.95); padding: 24px 28px; border-radius: 10px;
    width: 280px; text-align: left;
  }
  #settingsPanel h3 { margin: 0 0 16px; text-align: center; }
  #settingsPanel label { display: block; margin: 14px 0 6px; font-size: 13px; }
  #settingsPanel input[type=range] { width: 100%; }
  #settingsPanel .val { float: right; opacity: 0.8; }
  #settingsPanel button {
    margin-top: 20px; width: 100%; padding: 10px; border-radius: 6px; border: none;
    background: #4caf50; color: white; font-weight: bold; cursor: pointer;
  }
  .hotbarCount {
    position: absolute; bottom: 1px; right: 3px; font-size: 10px; color: white;
    text-shadow: 1px 1px 1px #000; pointer-events: none;
  }

  /* ----- Thanh đói ----- */
  #hungerContainer {
    position: absolute; top: 44px; left: 14px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
  }
  #hungerIcon { font-size: 18px; }
  #hungerBarBg {
    width: 160px; height: 14px; background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; overflow: hidden;
  }
  #hungerBarFill {
    height: 100%; width: 100%; background: linear-gradient(90deg,#ffb74d,#e65100);
    transition: width 0.2s ease;
  }
  #hungerText { color: white; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
  #eatBtn {
    margin-left: 4px; padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.5); color: white; font-size: 12px; cursor: pointer;
  }
  #eatBtn:disabled { opacity: 0.4; cursor: default; }

  /* ----- Túi đồ ----- */
  #inventoryBtn {
    position: absolute; top: 14px; right: 62px; z-index: 7;
    width: 40px; height: 40px; border-radius: 50%; background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.5); color: white; font-size: 18px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  #inventoryPanel {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 9; color: white; align-items: center; justify-content: center;
  }
  #inventoryPanel .box {
    background: rgba(30,30,30,0.95); padding: 24px 28px; border-radius: 10px;
    width: 300px; text-align: left;
  }
  #inventoryPanel h3 { margin: 0 0 16px; text-align: center; }
  #invGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .invItem {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: rgba(255,255,255,0.06); border-radius: 8px; padding: 8px 4px; font-size: 12px;
  }
  .invSwatch { width: 28px; height: 28px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.4); }
  #inventoryPanel button {
    margin-top: 20px; width: 100%; padding: 10px; border-radius: 6px; border: none;
    background: #4caf50; color: white; font-weight: bold; cursor: pointer;
  }

  /* ----- Ngồi / Chạy ----- */
  #moveModeButtons {
    position: absolute; top: 78px; left: 14px; z-index: 5; display: flex; gap: 6px;
  }
  #moveModeButtons button {
    padding: 6px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.5); color: white; font-size: 12px; cursor: pointer;
  }
  #moveModeButtons button.toggledOn { background: #2e7d32; border-color: #fff; }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="healthContainer">
  <span id="healthIcon">❤️</span>
  <div id="healthBarBg"><div id="healthBarFill"></div></div>
  <span id="healthText">100</span>
</div>
<div id="hungerContainer">
  <span id="hungerIcon">🍗</span>
  <div id="hungerBarBg"><div id="hungerBarFill"></div></div>
  <span id="hungerText">100</span>
  <button id="eatBtn">Ăn 🍖 x<span id="meatCountLabel">0</span></button>
</div>
<div id="hint">WASD: di chuyển | Chuột: nhìn | Space: nhảy<br>Chuột trái: phá khối / đánh động vật | Chuột phải: đặt khối | 1-6: chọn khối<br>F: ăn thịt | I: túi đồ | C: ngồi | Shift: chạy | ⚙️: độ nhạy</div>
<div id="moveModeButtons">
  <button id="sitBtn">🪑 Ngồi</button>
  <button id="runBtn">🏃 Chạy</button>
</div>
<div id="hotbar"></div>
<div id="blocker"><h2>Mini Minecraft</h2><p>Nhấn để bắt đầu chơi</p></div>

<div id="settingsBtn">⚙️</div>
<div id="inventoryBtn">🎒</div>
<div id="inventoryPanel">
  <div class="box">
    <h3>Túi đồ</h3>
    <div id="invGrid"></div>
    <button id="closeInventory">Đóng</button>
  </div>
</div>
<div id="settingsPanel">
  <div class="box">
    <h3>Cài đặt độ nhạy</h3>
    <label>Độ nhạy chuột (PC) <span class="val" id="mouseSensVal">1.0x</span></label>
    <input type="range" id="mouseSensSlider" min="0.2" max="3" step="0.1" value="1">
    <label>Độ nhạy chạm (Mobile) <span class="val" id="touchSensVal">1.0x</span></label>
    <input type="range" id="touchSensSlider" min="0.2" max="3" step="0.1" value="1">
    <button id="closeSettings">Đóng</button>
  </div>
</div>

<div id="mobileControls">
  <div id="lookArea"></div>
  <div id="joystickBase"><div id="joystickKnob"></div></div>
  <div id="breakBtn" class="actionBtn">Phá</div>
  <div id="placeBtn" class="actionBtn">Đặt</div>
  <div id="jumpBtn" class="actionBtn">Nhảy</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ----- Cấu hình cơ bản -----
const WORLD_SIZE = 40;          // kích thước bản đồ (WORLD_SIZE x WORLD_SIZE)
const BLOCK_TYPES = [
  { name: 'Cỏ',  color: 0x4caf50 },
  { name: 'Đất', color: 0x8d6e42 },
  { name: 'Đá',  color: 0x888888 },
  { name: 'Cát', color: 0xe0d18f },
  { name: 'Gỗ',  color: 0x6b4423 },
  { name: 'Lá',  color: 0x2e7d32 },
];
let selectedBlock = 0;
const inventory = new Array(BLOCK_TYPES.length).fill(0); // số block đang có, tăng lên khi đào

// ----- Scene / Camera / Renderer -----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 90);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ----- Ánh sáng -----
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(50, 80, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40; sun.shadow.camera.bottom = -40;
scene.add(sun);

// ----- Sinh thế giới -----
const blockGeo = new THREE.BoxGeometry(1, 1, 1);
const materials = BLOCK_TYPES.map(b => new THREE.MeshLambertMaterial({ color: b.color }));

// Lưu block đã đặt/xóa theo key "x,y,z" -> mesh (null nghĩa là đã bị phá)
const world = new Map();
function key(x,y,z){ return `${x},${y},${z}`; }

function heightAt(x, z) {
  return Math.floor(2 + Math.sin(x/5)*2 + Math.cos(z/5)*2);
}

function addBlock(x, y, z, typeIndex, castShadow=true) {
  const mesh = new THREE.Mesh(blockGeo, materials[typeIndex]);
  mesh.position.set(x, y, z);
  mesh.castShadow = castShadow;
  mesh.receiveShadow = true;
  mesh.userData.type = typeIndex;
  scene.add(mesh);
  world.set(key(x,y,z), mesh);
}

function removeBlockAt(x,y,z){
  const k = key(x,y,z);
  const mesh = world.get(k);
  if (mesh) {
    scene.remove(mesh);
    world.set(k, null); // đánh dấu là trống, khác với "chưa từng tồn tại"
  }
}

// Hàm giả-ngẫu nhiên ổn định theo tọa độ (để tạo cùng 1 bản đồ mỗi lần chạy)
function hashRandom(x, z, seed) {
  let h = Math.sin(x * 127.1 + z * 311.7 + seed * 74.7) * 43758.5453;
  return h - Math.floor(h);
}

function isVoidPit(x, z) {
  // Vài hố trống rải rác trên bản đồ (không tính gần điểm xuất phát)
  if (Math.hypot(x, z) < 5) return false;
  return hashRandom(x, z, 1) < 0.025;
}

function addTree(x, y, z) {
  const trunkHeight = 3 + Math.floor(hashRandom(x, z, 2) * 2); // 3-4 khối gỗ
  for (let i = 1; i <= trunkHeight; i++) addBlock(x, y + i, z, 4, false);
  const leafY = y + trunkHeight;
  for (let lx = -2; lx <= 2; lx++) {
    for (let lz = -2; lz <= 2; lz++) {
      for (let ly = 0; ly <= 2; ly++) {
        const dist = Math.abs(lx) + Math.abs(lz) + Math.abs(ly - 1) * 0.7;
        if (dist <= 2.4 && !(lx === 0 && lz === 0 && ly === 0)) {
          const bx = x + lx, by = leafY + ly, bz = z + lz;
          if (!world.has(key(bx, by, bz))) addBlock(bx, by, bz, 5, false);
        }
      }
    }
  }
}

for (let x = -WORLD_SIZE/2; x < WORLD_SIZE/2; x++) {
  for (let z = -WORLD_SIZE/2; z < WORLD_SIZE/2; z++) {
    if (isVoidPit(x, z)) continue; // để trống -> tạo void/hố
    const h = heightAt(x, z);
    for (let y = 0; y <= h; y++) {
      let type = 2; // đá
      if (y === h) type = z > 4 ? 3 : 0; // mặt trên: cát hoặc cỏ
      else if (y > h - 2) type = 1; // đất ngay dưới mặt
      addBlock(x, y, z, type);
    }
    // Cây mọc trên cỏ, thưa thớt, tránh sát điểm xuất phát
    if (z <= 4 && Math.hypot(x, z) > 4 && hashRandom(x, z, 3) < 0.012) {
      addTree(x, h, z);
    }
  }
}

// ----- Động vật (heo, bò, cừu) -----
const animals = [];

function createAnimalMesh(kind) {
  const group = new THREE.Group();
  let bodyColor, headColor, legColor, bodySize, headSize;
  if (kind === 'pig') {
    bodyColor = 0xf3a9c1; headColor = 0xf3a9c1; legColor = 0xdb88a4;
    bodySize = [0.9, 0.55, 1.2]; headSize = [0.5, 0.45, 0.45];
  } else if (kind === 'cow') {
    bodyColor = 0xf5f0e6; headColor = 0x3b2a20; legColor = 0x3b2a20;
    bodySize = [1.0, 0.65, 1.4]; headSize = [0.5, 0.5, 0.5];
  } else { // sheep
    bodyColor = 0xffffff; headColor = 0x2b2b2b; legColor = 0x2b2b2b;
    bodySize = [0.9, 0.6, 1.1]; headSize = [0.4, 0.4, 0.4];
  }
  const bodyMat = new THREE.MeshLambertMaterial({ color: bodyColor });
  const headMat = new THREE.MeshLambertMaterial({ color: headColor });
  const legMat = new THREE.MeshLambertMaterial({ color: legColor });

  const body = new THREE.Mesh(new THREE.BoxGeometry(...bodySize), bodyMat);
  body.position.y = 0.55;
  body.castShadow = true;
  group.add(body);

  const head = new THREE.Mesh(new THREE.BoxGeometry(...headSize), headMat);
  head.position.set(0, 0.65, bodySize[2]/2 + headSize[2]/2 - 0.05);
  head.castShadow = true;
  group.add(head);

  const legGeo = new THREE.BoxGeometry(0.15, 0.4, 0.15);
  const ox = bodySize[0]/2 - 0.1, oz = bodySize[2]/2 - 0.15;
  [[ox,oz],[-ox,oz],[ox,-oz],[-ox,-oz]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(lx, 0.2, lz);
    leg.castShadow = true;
    group.add(leg);
  });

  group.traverse(c => { if (c.isMesh) c.userData.isAnimalPart = true; });
  return group;
}

function spawnAnimalAt(kind, x, z) {
  const h = heightAt(x, z);
  const mesh = createAnimalMesh(kind);
  mesh.position.set(x, h + 0.5, z);
  scene.add(mesh);
  animals.push({ mesh, kind, hp: 3, target: { x, z }, speed: 0.018 + Math.random()*0.014, nextDecision: 0 });
}

function spawnRandomAnimal(kind) {
  for (let tries = 0; tries < 25; tries++) {
    const x = Math.floor((Math.random()-0.5) * WORLD_SIZE * 0.8);
    const z = Math.floor((Math.random()-0.5) * WORLD_SIZE * 0.8);
    if (isVoidPit(x, z)) continue;
    spawnAnimalAt(kind, x, z);
    return;
  }
}

['pig','pig','pig','pig','cow','cow','cow','cow','sheep','sheep','sheep','sheep'].forEach(spawnRandomAnimal);

function updateAnimals() {
  const now = performance.now();
  animals.forEach(a => {
    if (now > a.nextDecision) {
      let tx, tz, ok = false;
      for (let tries = 0; tries < 6; tries++) {
        tx = THREE.MathUtils.clamp(a.mesh.position.x + (Math.random()-0.5)*8, -WORLD_SIZE/2+1, WORLD_SIZE/2-1);
        tz = THREE.MathUtils.clamp(a.mesh.position.z + (Math.random()-0.5)*8, -WORLD_SIZE/2+1, WORLD_SIZE/2-1);
        if (!isVoidPit(Math.round(tx), Math.round(tz))) { ok = true; break; }
      }
      if (ok) a.target = { x: tx, z: tz };
      a.nextDecision = now + 2500 + Math.random()*3000;
    }
    const dx = a.target.x - a.mesh.position.x;
    const dz = a.target.z - a.mesh.position.z;
    const dist = Math.hypot(dx, dz);
    if (dist > 0.1) {
      a.mesh.position.x += (dx/dist) * a.speed;
      a.mesh.position.z += (dz/dist) * a.speed;
      a.mesh.rotation.y = Math.atan2(dx, dz);
    }
    const groundH = heightAt(Math.round(a.mesh.position.x), Math.round(a.mesh.position.z));
    a.mesh.position.y = groundH + 0.5;
  });
}

function flashAnimal(a) {
  a.mesh.traverse(c => {
    if (c.isMesh) {
      const original = c.material.color.getHex();
      c.material = c.material.clone();
      c.material.color.setHex(0xff5555);
      setTimeout(() => { if (c.material) c.material.color.setHex(original); }, 120);
    }
  });
}

function attackAnimal(idx) {
  const a = animals[idx];
  if (!a) return;
  a.hp--;
  flashAnimal(a);
  if (a.hp <= 0) {
    scene.remove(a.mesh);
    spawnDropEffect(a.mesh.position.x, a.mesh.position.y, a.mesh.position.z, 0xc1440e);
    meatCount++;
    updateHungerUI();
    renderInventoryPanel();
    animals.splice(idx, 1);
    setTimeout(() => spawnRandomAnimal(a.kind), 15000);
  }
}

// ----- Hotbar UI -----
const hotbar = document.getElementById('hotbar');
BLOCK_TYPES.forEach((b, i) => {
  const el = document.createElement('div');
  el.className = 'slot' + (i === selectedBlock ? ' active' : '');
  el.style.background = '#' + b.color.toString(16).padStart(6,'0');
  el.style.position = 'relative';
  el.title = b.name;
  const count = document.createElement('span');
  count.className = 'hotbarCount';
  count.textContent = '0';
  el.appendChild(count);
  el.addEventListener('click', () => { selectedBlock = i; updateHotbar(); });
  hotbar.appendChild(el);
});
function updateHotbar() {
  [...hotbar.children].forEach((el, i) => {
    el.classList.toggle('active', i === selectedBlock);
    el.querySelector('.hotbarCount').textContent = inventory[i];
  });
}
updateHotbar();
window.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= String(BLOCK_TYPES.length)) {
    selectedBlock = parseInt(e.key) - 1;
    updateHotbar();
  }
});

// ----- Điều khiển góc nhìn (Pointer Lock) -----
const blocker = document.getElementById('blocker');
const mobileControls = document.getElementById('mobileControls');
let yaw = 0, pitch = 0;
let locked = false;

const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

if (isMobile) {
  mobileControls.style.display = 'block';
  document.getElementById('hint').innerHTML =
    'Joystick trái: di chuyển | Vuốt bên phải: nhìn quanh<br>Phá = đánh động vật | 🪑 Ngồi (không té) | 🏃 giữ để chạy | 🎒 túi đồ | ⚙️ độ nhạy';
}

// ----- Cài đặt độ nhạy -----
let mouseSensitivity = 1, touchSensitivity = 1;
let settingsOpen = false;
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const mouseSensSlider = document.getElementById('mouseSensSlider');
const touchSensSlider = document.getElementById('touchSensSlider');
const mouseSensVal = document.getElementById('mouseSensVal');
const touchSensVal = document.getElementById('touchSensVal');

mouseSensSlider.addEventListener('input', () => {
  mouseSensitivity = parseFloat(mouseSensSlider.value);
  mouseSensVal.textContent = mouseSensitivity.toFixed(1) + 'x';
});
touchSensSlider.addEventListener('input', () => {
  touchSensitivity = parseFloat(touchSensSlider.value);
  touchSensVal.textContent = touchSensitivity.toFixed(1) + 'x';
});

settingsBtn.addEventListener('click', () => {
  settingsOpen = true;
  settingsPanel.style.display = 'flex';
  if (!isMobile && document.pointerLockElement) document.exitPointerLock();
});
document.getElementById('closeSettings').addEventListener('click', () => {
  settingsOpen = false;
  settingsPanel.style.display = 'none';
  if (!isMobile && locked) document.body.requestPointerLock();
});

// ----- Túi đồ -----
let invOpen = false;
const inventoryBtn = document.getElementById('inventoryBtn');
const inventoryPanel = document.getElementById('inventoryPanel');
const invGrid = document.getElementById('invGrid');

function renderInventoryPanel() {
  invGrid.innerHTML = '';
  BLOCK_TYPES.forEach((b, i) => {
    const item = document.createElement('div');
    item.className = 'invItem';
    item.innerHTML = `<div class="invSwatch" style="background:#${b.color.toString(16).padStart(6,'0')}"></div><span>${b.name}</span><span>x${inventory[i]}</span>`;
    invGrid.appendChild(item);
  });
  const meatItem = document.createElement('div');
  meatItem.className = 'invItem';
  meatItem.innerHTML = `<div class="invSwatch" style="background:#c1440e"></div><span>Thịt</span><span>x${meatCount}</span>`;
  invGrid.appendChild(meatItem);
}

function isMenuOpen() { return settingsOpen || invOpen; }

function openInventory() {
  invOpen = true;
  renderInventoryPanel();
  inventoryPanel.style.display = 'flex';
  if (!isMobile && document.pointerLockElement) document.exitPointerLock();
}
function closeInventory() {
  invOpen = false;
  inventoryPanel.style.display = 'none';
  if (!isMobile && locked) document.body.requestPointerLock();
}
inventoryBtn.addEventListener('click', openInventory);
document.getElementById('closeInventory').addEventListener('click', closeInventory);
window.addEventListener('keydown', (e) => {
  if (e.key === 'i' || e.key === 'I') { invOpen ? closeInventory() : openInventory(); }
  if (e.key === 'f' || e.key === 'F') { eatMeat(); }
  if (e.key === 'c' || e.key === 'C') { setSitting(!isSitting); }
});

blocker.addEventListener('click', () => {
  if (isMobile) {
    locked = true;
    blocker.style.display = 'none';
  } else {
    document.body.requestPointerLock();
  }
});
document.addEventListener('pointerlockchange', () => {
  if (isMobile) return;
  locked = document.pointerLockElement === document.body;
  if (!settingsOpen) blocker.style.display = locked ? 'none' : 'flex';
});
document.addEventListener('mousemove', (e) => {
  if (!locked || isMobile || isMenuOpen()) return;
  yaw -= e.movementX * 0.0022 * mouseSensitivity;
  pitch -= e.movementY * 0.0022 * mouseSensitivity;
  pitch = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, pitch));
});

// ----- Nhìn quanh bằng vuốt tay (mobile) -----
const lookArea = document.getElementById('lookArea');
let lookTouchId = null, lastLookX = 0, lastLookY = 0;
lookArea.addEventListener('touchstart', (e) => {
  const t = e.changedTouches[0];
  lookTouchId = t.identifier;
  lastLookX = t.clientX; lastLookY = t.clientY;
}, { passive: true });
lookArea.addEventListener('touchmove', (e) => {
  if (isMenuOpen()) return;
  for (const t of e.changedTouches) {
    if (t.identifier !== lookTouchId) continue;
    const dx = t.clientX - lastLookX, dy = t.clientY - lastLookY;
    lastLookX = t.clientX; lastLookY = t.clientY;
    yaw -= dx * 0.0045 * touchSensitivity;
    pitch -= dy * 0.0045 * touchSensitivity;
    pitch = Math.max(-Math.PI/2 + 0.01, Math.min(Math.PI/2 - 0.01, pitch));
  }
}, { passive: true });
lookArea.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) if (t.identifier === lookTouchId) lookTouchId = null;
});

// ----- Joystick di chuyển (mobile) -----
const joyBase = document.getElementById('joystickBase');
const joyKnob = document.getElementById('joystickKnob');
let joyTouchId = null;
let joyVec = { x: 0, y: 0 }; // x: trái/phải, y: trước/sau (-1..1)
const JOY_RADIUS = 45;

function joyReset() {
  joyVec = { x: 0, y: 0 };
  joyKnob.style.left = '35px';
  joyKnob.style.top = '35px';
}
joyBase.addEventListener('touchstart', (e) => {
  const t = e.changedTouches[0];
  joyTouchId = t.identifier;
}, { passive: true });
joyBase.addEventListener('touchmove', (e) => {
  if (isMenuOpen()) return;
  for (const t of e.changedTouches) {
    if (t.identifier !== joyTouchId) continue;
    const rect = joyBase.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const dist = Math.min(Math.hypot(dx, dy), JOY_RADIUS);
    const angle = Math.atan2(dy, dx);
    dx = Math.cos(angle) * dist; dy = Math.sin(angle) * dist;
    joyKnob.style.left = (35 + dx) + 'px';
    joyKnob.style.top = (35 + dy) + 'px';
    joyVec = { x: dx / JOY_RADIUS, y: dy / JOY_RADIUS };
  }
}, { passive: true });
joyBase.addEventListener('touchend', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier === joyTouchId) { joyTouchId = null; joyReset(); }
  }
});

// ----- Nút Nhảy / Phá / Đặt (mobile) -----
const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys['Space'] = true; }, { passive: false });
jumpBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys['Space'] = false; }, { passive: false });

document.getElementById('breakBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (locked && !isMenuOpen()) breakBlock();
}, { passive: false });
document.getElementById('placeBtn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (locked && !isMenuOpen()) placeBlock();
}, { passive: false });

// ----- Di chuyển -----
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// ----- Ngồi / Chạy -----
let isSitting = false;
let runButtonHeld = false;
const sitBtn = document.getElementById('sitBtn');
const runBtn = document.getElementById('runBtn');

function setSitting(v) {
  isSitting = v;
  sitBtn.classList.toggle('toggledOn', v);
  sitBtn.textContent = v ? '🪑 Đứng dậy' : '🪑 Ngồi';
  if (v) player.vel.set(0, 0, 0); // ngồi xuống là đứng yên tại chỗ, không bị rơi/té
}
sitBtn.addEventListener('click', () => setSitting(!isSitting));

function setRunning(v) {
  runButtonHeld = v;
  runBtn.classList.toggle('toggledOn', isRunningNow());
}
function isRunningNow() {
  return !isSitting && (runButtonHeld || keys['ShiftLeft'] || keys['ShiftRight']);
}
runBtn.addEventListener('mousedown', () => setRunning(true));
runBtn.addEventListener('mouseup', () => setRunning(false));
runBtn.addEventListener('mouseleave', () => setRunning(false));
runBtn.addEventListener('touchstart', (e) => { e.preventDefault(); setRunning(true); }, { passive: false });
runBtn.addEventListener('touchend', (e) => { e.preventDefault(); setRunning(false); }, { passive: false });

const player = {
  pos: new THREE.Vector3(0, heightAt(0,0) + 3, 0),
  vel: new THREE.Vector3(0,0,0),
  onGround: false,
};
const SPAWN_POS = player.pos.clone();

// ----- Máu -----
const MAX_HEALTH = 100;
let health = MAX_HEALTH;
const healthBarFill = document.getElementById('healthBarFill');
const healthText = document.getElementById('healthText');

function updateHealthUI() {
  const pct = Math.max(0, health / MAX_HEALTH * 100);
  healthBarFill.style.width = pct + '%';
  healthText.textContent = Math.max(0, Math.round(health));
}

function takeDamage(amount) {
  if (amount <= 0) return;
  health = Math.max(0, health - amount);
  updateHealthUI();
  if (health <= 0) respawnPlayer();
}

function healOverTime() {
  if (hunger > 20 && health < MAX_HEALTH && health > 0) {
    health = Math.min(MAX_HEALTH, health + 1);
    hunger = Math.max(0, hunger - 1); // hồi máu tiêu hao độ đói
    updateHealthUI();
    updateHungerUI();
  } else if (hunger <= 0 && health > 0) {
    takeDamage(1); // đói quá sẽ mất máu
  }
}
setInterval(healOverTime, 3000);

// ----- Đói -----
const MAX_HUNGER = 100;
let hunger = MAX_HUNGER;
let meatCount = 0;
const hungerBarFill = document.getElementById('hungerBarFill');
const hungerText = document.getElementById('hungerText');
const meatCountLabel = document.getElementById('meatCountLabel');
const eatBtn = document.getElementById('eatBtn');

function updateHungerUI() {
  const pct = Math.max(0, hunger / MAX_HUNGER * 100);
  hungerBarFill.style.width = pct + '%';
  hungerText.textContent = Math.max(0, Math.round(hunger));
  meatCountLabel.textContent = meatCount;
  eatBtn.disabled = meatCount <= 0 || hunger >= MAX_HUNGER;
}
function eatMeat() {
  if (meatCount <= 0 || hunger >= MAX_HUNGER) return;
  meatCount--;
  hunger = Math.min(MAX_HUNGER, hunger + 35);
  updateHungerUI();
  renderInventoryPanel();
}
eatBtn.addEventListener('click', eatMeat);
setInterval(() => { hunger = Math.max(0, hunger - 1); updateHungerUI(); }, 15000);
updateHungerUI();

function respawnPlayer() {
  player.pos.copy(SPAWN_POS);
  player.vel.set(0, 0, 0);
  health = MAX_HEALTH;
  updateHealthUI();
}
updateHealthUI();

function isSolid(x,y,z){
  const k = key(Math.round(x), Math.round(y), Math.round(z));
  const v = world.get(k);
  return v !== undefined && v !== null;
}

const GRAVITY = -0.018;
const JUMP_SPEED = 0.28;
const MOVE_SPEED = 0.11;

function updatePlayer() {
  if (isSitting) {
    // Đang ngồi: đứng yên tại chỗ, không di chuyển, không rơi/té
    camera.position.set(player.pos.x, player.pos.y - 0.4, player.pos.z);
    camera.rotation.order = 'YXZ';
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
    return;
  }

  const running = isRunningNow();
  runBtn.classList.toggle('toggledOn', running);
  const speed = MOVE_SPEED * (running ? 1.8 : 1);

  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));

  let move = new THREE.Vector3();
  if (keys['KeyW']) move.add(forward);
  if (keys['KeyS']) move.sub(forward);
  if (keys['KeyD']) move.add(right);
  if (keys['KeyA']) move.sub(right);

  // Joystick mobile: joyVec.y < 0 nghĩa là đẩy lên (tiến), joyVec.x là trái/phải
  if (joyVec.x !== 0 || joyVec.y !== 0) {
    move.add(forward.clone().multiplyScalar(-joyVec.y));
    move.add(right.clone().multiplyScalar(joyVec.x));
  }

  if (move.lengthSq() > 1) move.normalize();
  move.multiplyScalar(speed);

  // Va chạm ngang đơn giản
  const nx = player.pos.x + move.x;
  const nz = player.pos.z + move.z;
  if (!isSolid(nx, player.pos.y, player.pos.z) && !isSolid(nx, player.pos.y - 1, player.pos.z)) player.pos.x = nx;
  if (!isSolid(player.pos.x, player.pos.y, nz) && !isSolid(player.pos.x, player.pos.y - 1, nz)) player.pos.z = nz;

  // Trọng lực
  player.vel.y += GRAVITY;
  if (keys['Space'] && player.onGround) {
    player.vel.y = JUMP_SPEED;
    player.onGround = false;
  }
  const ny = player.pos.y + player.vel.y;
  if (isSolid(player.pos.x, ny - 1.6, player.pos.z) && player.vel.y < 0) {
    if (player.vel.y < -0.35) {
      const damage = Math.round((Math.abs(player.vel.y) - 0.35) * 60);
      takeDamage(damage);
    }
    player.vel.y = 0;
    player.onGround = true;
  } else if (isSolid(player.pos.x, ny + 0.2, player.pos.z) && player.vel.y > 0) {
    player.vel.y = 0;
  } else {
    player.pos.y = ny;
    player.onGround = false;
  }

  camera.position.set(player.pos.x, player.pos.y, player.pos.z);
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  if (player.pos.y < -20) respawnPlayer();
}

// ----- Phá / Đặt khối -----
const raycaster = new THREE.Raycaster();
raycaster.far = 6;

function getTargetHit(includeAnimals) {
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const blockMeshes = [...world.values()].filter(m => m);
  let targets = blockMeshes;
  if (includeAnimals) {
    const animalMeshes = [];
    animals.forEach((a, idx) => a.mesh.traverse(c => {
      if (c.isMesh) { c.userData.animalIndex = idx; animalMeshes.push(c); }
    }));
    targets = blockMeshes.concat(animalMeshes);
  }
  const hits = raycaster.intersectObjects(targets, false);
  return hits.length ? hits[0] : null;
}

// ----- Hiệu ứng item rớt ra khi đào -----
const dropEffects = [];
function spawnDropEffect(x, y, z, color) {
  const mat = new THREE.MeshLambertMaterial({ color, transparent: true });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mat);
  mesh.position.set(x, y, z);
  scene.add(mesh);
  dropEffects.push({ mesh, start: performance.now(), duration: 450 });
}
function updateDropEffects() {
  const now = performance.now();
  for (let i = dropEffects.length - 1; i >= 0; i--) {
    const d = dropEffects[i];
    const t = Math.min(1, (now - d.start) / d.duration);
    d.mesh.position.y += 0.012;
    d.mesh.scale.setScalar(1 - t * 0.8);
    d.mesh.material.opacity = 1 - t;
    if (t >= 1) {
      scene.remove(d.mesh);
      d.mesh.geometry.dispose();
      d.mesh.material.dispose();
      dropEffects.splice(i, 1);
    }
  }
}

function breakBlock() {
  const hit = getTargetHit(true);
  if (!hit) return;
  if (hit.object.userData.isAnimalPart) {
    attackAnimal(hit.object.userData.animalIndex);
    return;
  }
  const p = hit.object.position;
  const typeIndex = hit.object.userData.type;
  removeBlockAt(p.x, p.y, p.z);
  inventory[typeIndex]++;
  updateHotbar();
  spawnDropEffect(p.x, p.y, p.z, BLOCK_TYPES[typeIndex].color);
}

function placeBlock() {
  if (inventory[selectedBlock] <= 0) return; // không còn block để đặt
  const hit = getTargetHit(false);
  if (!hit) return;
  const n = hit.face.normal;
  const p = hit.object.position;
  const nx = p.x + n.x, ny = p.y + n.y, nz = p.z + n.z;
  // không đặt đè lên vị trí người chơi
  const dist = Math.hypot(nx - player.pos.x, ny - (player.pos.y - 1), nz - player.pos.z);
  if (dist > 0.6 && !world.get(key(nx,ny,nz))) {
    addBlock(nx, ny, nz, selectedBlock);
    inventory[selectedBlock]--;
    updateHotbar();
  }
}

window.addEventListener('mousedown', (e) => {
  if (!locked || isMobile || isMenuOpen()) return;
  if (e.button === 0) breakBlock();       // trái: phá / đánh động vật
  else if (e.button === 2) placeBlock();  // phải: đặt
});
window.addEventListener('contextmenu', e => e.preventDefault());

// ----- Vòng lặp chính -----
function animate() {
  requestAnimationFrame(animate);
  if (locked && !isMenuOpen()) updatePlayer();
  updateAnimals();
  updateDropEffects();
  renderer.render(scene, camera);
}
animate();
</script>
