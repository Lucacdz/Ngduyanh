<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Minecraft - Fixed & Optimized</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background:#87CEEB; font-family: sans-serif; user-select: none; }
  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
    background: white; border-radius: 50%; transform: translate(-50%, -50%);
    pointer-events: none; mix-blend-mode: difference; z-index: 5;
  }
  #hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: white; background: rgba(0,0,0,0.5); padding: 8px 14px; border-radius: 8px;
    font-size: 13px; z-index: 5; text-align: center; line-height: 1.5; pointer-events: none;
  }
  #hotbar {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 5;
  }
  .slot {
    width: 40px; height: 40px; border: 2px solid #fff8; border-radius: 4px;
    display: flex; align-items: center; justify-content: center; box-sizing: border-box; cursor: pointer;
  }
  .slot.active { border-color: #fff; }
  #healthContainer {
    position: absolute; top: 14px; left: 14px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
  }
  #healthBarBg {
    width: 160px; height: 16px; background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; overflow: hidden;
  }
  #healthBarFill {
    height: 100%; width: 100%; background: linear-gradient(90deg,#ff4d4d,#e60000);
    transition: width 0.2s ease;
  }
  #healthText { color: white; font-size: 13px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
  
  /* Màn hình chờ bắt đầu game */
  #blocker {
    position: absolute; inset: 0; background: rgba(0,0,0,0.7); color: white;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer; z-index: 10; text-align: center;
  }

  /* ----- Giao diện điều khiển Mobile ----- */
  #mobileControls { display: none; }
  #lookArea { position: absolute; right: 0; top: 0; width: 60%; height: 100%; z-index: 3; touch-action: none; }
  #joystickBase {
    position: absolute; left: 26px; bottom: 26px; width: 120px; height: 120px;
    border-radius: 50%; background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.45); z-index: 6; touch-action: none;
  }
  #joystickKnob { position: absolute; left: 35px; top: 35px; width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.65); pointer-events: none; }
  
  .actionBtn {
    position: absolute; border-radius: 50%; background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5); color: white; z-index: 6;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold; touch-action: none;
  }
  #jumpBtn   { right: 26px; bottom: 26px;  width: 72px; height: 72px; }
  #placeBtn  { right: 26px; bottom: 118px; width: 60px; height: 60px; }
  #breakBtn  { right: 118px; bottom: 100px; width: 60px; height: 60px; }
  #mbRunBtn  { right: 118px; bottom: 26px;  width: 60px; height: 60px; }
  #mbSitBtn  { right: 200px; bottom: 26px;  width: 60px; height: 60px; }
  .actionBtn.toggledOn { background: #2e7d32 !important; border-color: #fff; }

  /* ----- Các nút tính năng góc trên ----- */
  .topBtn {
    position: absolute; top: 14px; z-index: 7; width: 40px; height: 40px; border-radius: 50%;
    background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.5); color: white;
    display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px;
  }
  #fullscreenBtn { right: 14px; }
  #settingsBtn   { right: 62px; }
  #inventoryBtn  { right: 110px; }

  #settingsPanel, #inventoryPanel {
    display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 9; color: white; align-items: center; justify-content: center;
  }
  .box { background: rgba(30,30,30,0.95); padding: 24px 28px; border-radius: 10px; width: 280px; text-align: left; }
  .box h3 { margin: 0 0 16px; text-align: center; }
  .box label { display: block; margin: 14px 0 6px; font-size: 13px; }
  .box input[type=range] { width: 100%; }
  .box .val { float: right; opacity: 0.8; }
  .box button { margin-top: 20px; width: 100%; padding: 10px; border-radius: 6px; border: none; background: #4caf50; color: white; font-weight: bold; cursor: pointer; }
  
  #invGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .invItem { display: flex; flex-direction: column; align-items: center; gap: 4px; background: rgba(255,255,255,0.06); border-radius: 8px; padding: 8px 4px; font-size: 12px; }
  .invSwatch { width: 28px; height: 28px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.4); }
  .hotbarCount { position: absolute; bottom: 1px; right: 3px; font-size: 10px; color: white; text-shadow: 1px 1px 1px #000; }

  #hungerContainer { position: absolute; top: 44px; left: 14px; z-index: 5; display: flex; align-items: center; gap: 8px; }
  #hungerBarBg { width: 160px; height: 14px; background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.5); border-radius: 8px; overflow: hidden; }
  #hungerBarFill { height: 100%; width: 100%; background: linear-gradient(90deg,#ffb74d,#e65100); transition: width 0.2s ease; }
  #hungerText { color: white; font-size: 12px; font-weight: bold; text-shadow: 1px 1px 2px #000; }
  #eatBtn { margin-left: 4px; padding: 3px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5); color: white; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="healthContainer">
  <span>❤️</span><div id="healthBarBg"><div id="healthBarFill"></div></div><span id="healthText">100</span>
</div>
<div id="hungerContainer">
  <span>🍗</span><div id="hungerBarBg"><div id="hungerBarFill"></div></div><span id="hungerText">100</span>
  <button id="eatBtn">Ăn 🍖 x<span id="meatCountLabel">0</span></button>
</div>

<div id="hint">WASD: Di chuyển | Chuột: Nhìn | Space: Nhảy | Shift: Chạy | C: Ngồi<br>Chuột trái: Phá khối | Chuột phải: Đặt khối | 1-7: Chọn khối | F: Ăn | I: Túi đồ</div>
<div id="blocker"><h2>Mini Minecraft</h2><p>Nhấn vào ĐÂY để bắt đầu chơi</p></div>

<div id="fullscreenBtn" class="topBtn" title="Toàn màn hình">📺</div>
<div id="settingsBtn" class="topBtn">⚙️</div>
<div id="inventoryBtn" class="topBtn">🎒</div>

<div id="inventoryPanel"><div class="box"><h3>Túi đồ</h3><div id="invGrid"></div><button id="closeInventory">Đóng</button></div></div>
<div id="settingsPanel">
  <div class="box">
    <h3>Cài đặt độ nhạy</h3>
    <label>Chuột (PC) <span class="val" id="mouseSensVal">1.0x</span></label>
    <input type="range" id="mouseSensSlider" min="0.2" max="3" step="0.1" value="1">
    <label>Vuốt (Mobile) <span class="val" id="touchSensVal">1.0x</span></label>
    <input type="range" id="touchSensSlider" min="0.2" max="3" step="0.1" value="1">
    <button id="closeSettings">Đóng</button>
  </div>
</div>

<div id="mobileControls">
  <div id="lookArea"></div>
  <div id="joystickBase"><div id="joystickKnob"></div></div>
  <div id="breakBtn" class="actionBtn">Phá</div>
  <div id="placeBtn" class="actionBtn">Đặt</div>
  <div id="jumpBtn" class="actionBtn">Nhảy</div>
  <div id="mbRunBtn" class="actionBtn">Chạy</div>
  <div id="mbSitBtn" class="actionBtn">Ngồi</div>
</div>

<div id="hotbar"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ----- Cấu hình thế giới -----
const WORLD_SIZE = 100; 
const BLOCK_TYPES = [
  { name: 'Cỏ',  color: 0x4caf50, transparent: false },
  { name: 'Đất', color: 0x8d6e42, transparent: false },
  { name: 'Đá',  color: 0x888888, transparent: false },
  { name: 'Cát', color: 0xe0d18f, transparent: false },
  { name: 'Gỗ',  color: 0x6b4423, transparent: false },
  { name: 'Lá',  color: 0x2e7d32, transparent: false },
  { name: 'Nước', color: 0x1e88e5, transparent: true, opacity: 0.6 }
];
let selectedBlock = 0;
const inventory = new Array(BLOCK_TYPES.length).fill(10); // Cho sẵn 10 khối mỗi loại để test

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = false; // Tắt shadow hoàn toàn để tối ưu FPS tối đa cho map nước
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

scene.add(new THREE.AmbientLight(0xffffff, 0.85));
const sun = new THREE.DirectionalLight(0xffffff, 0.4);
sun.position.set(30, 80, 20);
scene.add(sun);

// ----- Hệ thống InstancedMesh -----
const blockGeo = new THREE.BoxGeometry(1, 1, 1);
const materials = BLOCK_TYPES.map(b => new THREE.MeshLambertMaterial({ color: b.color, transparent: b.transparent, opacity: b.opacity ?? 1 }));

const maxInstances = WORLD_SIZE * WORLD_SIZE * 15;
const instancedMeshes = BLOCK_TYPES.map((_, i) => {
  const im = new THREE.InstancedMesh(blockGeo, materials[i], maxInstances);
  im.count = 0;
  scene.add(im);
  return im;
});

const worldData = new Map();
const worldVisuals = new Map(); 
function key(x,y,z){ return `${x},${y},${z}`; }
function heightAt(x, z) { return Math.floor(2 + Math.sin(x/8)*3 + Math.cos(z/8)*3); }

// Khởi tạo Map dữ liệu địa hình
for (let x = -WORLD_SIZE/2; x < WORLD_SIZE/2; x++) {
  for (let z = -WORLD_SIZE/2; z < WORLD_SIZE/2; z++) {
    const h = heightAt(x, z);
    for (let y = -2; y <= Math.max(h, 1); y++) {
      let type = 2; // Đá
      if (y > h) {
        if (y <= 1) type = 6; // Nước
        else continue;
      } else if (y === h) {
        type = (h <= 1) ? 3 : 0; // Cát nếu ở vùng thấp, ngược lại là Cỏ
      } else if (y > h - 2) {
        type = 1; // Đất
      }
      worldData.set(key(x,y,z), type);
    }
  }
}

function rebuildVisuals() {
  instancedMeshes.forEach(im => im.count = 0);
  worldVisuals.clear();
  const dummy = new THREE.Object3D();
  const counts = new Array(BLOCK_TYPES.length).fill(0);

  for (let [kStr, type] of worldData.entries()) {
    const [x, y, z] = kStr.split(',').map(Number);
    
    // Culling tối ưu hóa hiệu năng cực mạnh
    if (type !== 6) {
      const top = worldData.has(key(x, y+1, z));
      const bottom = worldData.has(key(x, y-1, z));
      const left = worldData.has(key(x-1, y, z));
      const right = worldData.has(key(x+1, y, z));
      const front = worldData.has(key(x, y, z+1));
      const back = worldData.has(key(x, y, z-1));
      if (top && bottom && left && right && front && back) continue; 
    }

    const im = instancedMeshes[type];
    const idx = counts[type];
    dummy.position.set(x, y, z);
    dummy.updateMatrix();
    im.setMatrixAt(idx, dummy.matrix);
    
    worldVisuals.set(kStr, { type, instanceIdx: idx });
    counts[type]++;
  }
  instancedMeshes.forEach((im, i) => {
    im.count = counts[i];
    im.instanceMatrix.needsUpdate = true;
  });
}
rebuildVisuals();

// ----- Khởi tạo Hotbar UI -----
const hotbar = document.getElementById('hotbar');
BLOCK_TYPES.forEach((b, i) => {
  const el = document.createElement('div');
  el.className = 'slot' + (i === selectedBlock ? ' active' : '');
  el.style.background = '#' + b.color.toString(16).padStart(6,'0');
  el.innerHTML = `<span class="hotbarCount">${inventory[i]}</span>`;
  el.addEventListener('click', (e) => { e.stopPropagation(); selectedBlock = i; updateHotbar(); });
  hotbar.appendChild(el);
});
function updateHotbar() { [...hotbar.children].forEach((el, i) => { el.classList.toggle('active', i === selectedBlock); el.querySelector('.hotbarCount').textContent = inventory[i]; }); }

// ----- Xử lý trạng thái khóa chơi (FIX LỖI CHÍNH Ở ĐÂY) -----
let yaw = 0, pitch = 0, gameActive = false;
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const blocker = document.getElementById('blocker');
const mobileControls = document.getElementById('mobileControls');

if (isMobile) {
  mobileControls.style.display = 'block';
}

// Sửa logic kích hoạt để tương thích hoàn toàn không bị kẹt lỗi PointerLock
function activateGame() {
  gameActive = true;
  blocker.style.display = 'none';
  if (!isMobile && document.pointerLockElement !== document.body) {
    document.body.requestPointerLock();
  }
}

blocker.addEventListener('click', activateGame);
blocker.addEventListener('touchstart', (e) => { e.preventDefault(); activateGame(); });

document.addEventListener('pointerlockchange', () => {
  if (!isMobile) {
    gameActive = (document.pointerLockElement === document.body);
    blocker.style.display = gameActive ? 'none' : 'flex';
  }
});

// Xử lý xoay góc nhìn PC
let mouseSensitivity = 1.0;
document.addEventListener('mousemove', (e) => {
  if (!gameActive || isMobile) return;
  yaw -= e.movementX * 0.0022 * mouseSensitivity;
  pitch -= e.movementY * 0.0022 * mouseSensitivity;
  pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
});

// Xử lý xoay góc nhìn Mobile (Vuốt màn hình bên phải)
let touchSensitivity = 1.0;
const lookArea = document.getElementById('lookArea');
let lookTouchId = null, lastLookX = 0, lastLookY = 0;

lookArea.addEventListener('touchstart', (e) => {
  if (!gameActive) return;
  const t = e.changedTouches[0];
  lookTouchId = t.identifier; lastLookX = t.clientX; lastLookY = t.clientY;
}, { passive: true });

lookArea.addEventListener('touchmove', (e) => {
  if (!gameActive) return;
  for (const t of e.changedTouches) {
    if (t.identifier !== lookTouchId) continue;
    yaw -= (t.clientX - lastLookX) * 0.0045 * touchSensitivity;
    pitch -= (t.clientY - lastLookY) * 0.0045 * touchSensitivity;
    lastLookX = t.clientX; lastLookY = t.clientY;
    pitch = Math.max(-Math.PI/2 + 0.05, Math.min(Math.PI/2 - 0.05, pitch));
  }
}, { passive: true });

// Hệ thống Joystick Mobile
let joyVec = { x: 0, y: 0 }, joyTouchId = null;
const joyKnob = document.getElementById('joystickKnob');
document.getElementById('joystickBase').addEventListener('touchstart', (e) => { joyTouchId = e.changedTouches[0].identifier; }, { passive: true });
document.getElementById('joystickBase').addEventListener('touchmove', (e) => {
  for (const t of e.changedTouches) {
    if (t.identifier !== joyTouchId) continue;
    const r = document.getElementById('joystickBase').getBoundingClientRect();
    let dx = t.clientX - (r.left + 60), dy = t.clientY - (r.top + 60);
    const dist = Math.min(Math.hypot(dx, dy), 45); const angle = Math.atan2(dy, dx);
    dx = Math.cos(angle) * dist; dy = Math.sin(angle) * dist;
    joyKnob.style.left = (35 + dx) + 'px'; joyKnob.style.top = (35 + dy) + 'px';
    joyVec = { x: dx / 45, y: dy / 45 };
  }
}, { passive: true });
document.getElementById('joystickBase').addEventListener('touchend', () => { joyTouchId = null; joyVec = {x:0,y:0}; joyKnob.style.left='35px'; joyKnob.style.top='35px'; });

// ----- Hệ thống di chuyển & Nút hành động -----
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Phím số chọn nhanh Hotbar PC
window.addEventListener('keydown', e => {
  if (e.key >= '1' && e.key <= '7') { selectedBlock = parseInt(e.key) - 1; updateHotbar(); }
});

let isSitting = false, runButtonHeld = false;
const player = { pos: new THREE.Vector3(0, heightAt(0,0) + 5, 0), vel: new THREE.Vector3(0,0,0), onGround: false };

function setSitting(v) { isSitting = v; document.getElementById('mbSitBtn').classList.toggle('toggledOn', v); }
function setRunning(v) { runButtonHeld = v; document.getElementById('mbRunBtn').classList.toggle('toggledOn', v); }

document.getElementById('mbSitBtn').addEventListener('touchstart', (e) => { e.preventDefault(); setSitting(!isSitting); });
document.getElementById('mbRunBtn').addEventListener('touchstart', (e) => { e.preventDefault(); setRunning(!runButtonHeld); });
document.getElementById('jumpBtn').addEventListener('touchstart', (e) => { e.preventDefault(); keys['Space'] = true; });
document.getElementById('jumpBtn').addEventListener('touchend', (e) => { e.preventDefault(); keys['Space'] = false; });
document.getElementById('breakBtn').addEventListener('touchstart', (e) => { e.preventDefault(); breakBlock(); });
document.getElementById('placeBtn').addEventListener('touchstart', (e) => { e.preventDefault(); placeBlock(); });

// Tính năng Toàn Màn Hình (Fullscreen) không xung đột game
const fullscreenBtn = document.getElementById('fullscreenBtn');
fullscreenBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().then(() => { if(!isMobile) document.body.requestPointerLock(); }).catch(err => console.log(err));
    fullscreenBtn.textContent = "✖️";
  } else {
    document.exitFullscreen();
    fullscreenBtn.textContent = "📺";
  }
});

let health=100, hunger=100;
function takeDamage(a){ health=Math.max(0, health-a); document.getElementById('healthBarFill').style.width=health+'%'; document.getElementById('healthText').textContent=health; if(health<=0) { player.pos.set(0, heightAt(0,0)+5, 0); health=100; takeDamage(0); } }

function updatePlayer() {
  const speed = 0.12 * ((runButtonHeld || keys['ShiftLeft']) ? 1.6 : (isSitting ? 0.5 : 1));
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  let move = new THREE.Vector3();
  
  if (keys['KeyW']) move.add(forward); if (keys['KeyS']) move.sub(forward);
  if (keys['KeyD']) move.add(right); if (keys['KeyA']) move.sub(right);
  if (joyVec.x !== 0 || joyVec.y !== 0) { move.add(forward.clone().multiplyScalar(-joyVec.y)); move.add(right.clone().multiplyScalar(joyVec.x)); }
  if (move.lengthSq() > 1) move.normalize();
  move.multiplyScalar(speed);

  // Xử lý va chạm khối cơ bản
  const nx = player.pos.x + move.x, nz = player.pos.z + move.z;
  if (!worldData.has(key(Math.round(nx), Math.round(player.pos.y), Math.round(player.pos.z)))) player.pos.x = nx;
  if (!worldData.has(key(Math.round(player.pos.x), Math.round(player.pos.y), Math.round(nz)))) player.pos.z = nz;

  player.vel.y -= 0.015; // Trọng lực
  if (keys['Space'] && player.onGround) { player.vel.y = 0.25; player.onGround = false; }
  
  const ny = player.pos.y + player.vel.y;
  const standKey = key(Math.round(player.pos.x), Math.round(ny - 1.6), Math.round(player.pos.z));
  
  if (worldData.has(standKey) && player.vel.y < 0) {
    if (player.vel.y < -0.42) takeDamage(Math.round((Math.abs(player.vel.y)-0.4)*60));
    player.vel.y = 0; player.onGround = true;
  } else {
    player.pos.y = ny; player.onGround = false;
  }

  camera.position.set(player.pos.x, player.pos.y + (isSitting ? -0.3 : 0), player.pos.z);
  camera.rotation.order = 'YXZ'; camera.rotation.y = yaw; camera.rotation.x = pitch;
  if (player.pos.y < -30) { player.pos.set(0, 15, 0); player.vel.set(0,0,0); }
}

// ----- Logic Phá / Đặt Khối -----
const raycaster = new THREE.Raycaster(); raycaster.far = 5;
function getTargetHit() {
  raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
  const activeMeshes = instancedMeshes.filter(im => im.count > 0);
  const hits = raycaster.intersectObjects(activeMeshes);
  return hits.length ? hits[0] : null;
}

function breakBlock() {
  const hit = getTargetHit(); if (!hit) return;
  const instanceId = hit.instanceId;
  const typeIndex = instancedMeshes.indexOf(hit.object);
  
  for (let [kStr, val] of worldVisuals.entries()) {
    if (val.type === typeIndex && val.instanceIdx === instanceId) {
      worldData.delete(kStr);
      inventory[typeIndex]++; updateHotbar();
      rebuildVisuals();
      break;
    }
  }
}

function placeBlock() {
  if (inventory[selectedBlock] <= 0) return;
  const hit = getTargetHit(); if (!hit) return;
  
  const n = hit.face.normal;
  const matrix = new THREE.Matrix4();
  hit.object.getMatrixAt(hit.instanceId, matrix);
  const position = new THREE.Vector3().setFromMatrixPosition(matrix);
  
  const nx = Math.round(position.x + n.x);
  const ny = Math.round(position.y + n.y);
  const nz = Math.round(position.z + n.z);
  const kStr = key(nx, ny, nz);

  if (!worldData.has(kStr)) {
    worldData.set(kStr, selectedBlock);
    inventory[selectedBlock]--; updateHotbar();
    rebuildVisuals();
  }
}

window.addEventListener('mousedown', (e) => { if (gameActive && !isMobile) { if (e.button === 0) breakBlock(); else if (e.button === 2) placeBlock(); } });
window.addEventListener('contextmenu', e => e.preventDefault());

// Cài đặt UI Panel phụ trợ
document.getElementById('settingsBtn').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('settingsPanel').style.display='flex'; document.exitPointerLock(); });
document.getElementById('closeSettings').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('settingsPanel').style.display='none'; });
