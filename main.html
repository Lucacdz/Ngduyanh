<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft HTML5 3D</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
        /* Tâm ngắm giữa màn hình */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: white;
        }
        #crosshair::before { top: 4px; left: 0; width: 10px; height: 2px; }
        #crosshair::after { top: 0; left: 4px; width: 2px; height: 10px; }

        /* Hướng dẫn chơi */
        #instructions {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }

        /* Thanh kho đồ (Hotbar) */
        #hotbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px;
            border: 4px solid #333;
            border-radius: 4px;
            pointer-events: auto;
        }
        .slot {
            width: 50px;
            height: 50px;
            margin: 0 4px;
            background: #8b8b8b;
            border: 3px solid #3c3c3c;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 12px;
            text-align: center;
            position: relative;
            cursor: pointer;
        }
        .slot.selected {
            border-color: #ffffff;
            background: #a8a8a8;
        }
        .slot-label {
            position: absolute;
            bottom: 2px;
            font-size: 10px;
            background: rgba(0,0,0,0.4);
            padding: 1px 2px;
        }

        /* Nút điều khiển trên Mobile / Hỗ trợ thêm */
        #controls-ui {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .ui-btn {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.3);
            border: 2px solid white;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #action-ui {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .action-btn {
            padding: 15px 25px;
            background: rgba(255, 0, 0, 0.5);
            color: white;
            border: 2px solid white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        #btn-place { background: rgba(0, 128, 0, 0.5); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="instructions">
        <h1 style="font-size: 32px; margin-bottom: 10px;">MINECRAFT HTML5</h1>
        <p>Bấm vào màn hình để CHƠI</p>
        <p style="font-size: 14px; color: #ccc;">
            Di chuyển: W, A, S, D | Nhảy: SPACE<br>
            Chuột trái: ĐÀO BLOCK | Chuột phải: ĐẶT BLOCK<br>
            Phím 1 - 6: Chọn ô kho đồ
        </p>
    </div>

    <div id="crosshair"></div>
    <div id="canvas-container"></div>

    <div id="controls-ui">
        <div style="display:flex; justify-content:center;"><button class="ui-btn" id="btn-w">W</button></div>
        <div style="display:flex; gap: 5px;">
            <button class="ui-btn" id="btn-a">A</button>
            <button class="ui-btn" id="btn-s">S</button>
            <button class="ui-btn" id="btn-d">D</button>
        </div>
    </div>

    <div id="action-ui">
        <button class="action-btn" id="btn-dig">ĐÀO (L-Click)</button>
        <button class="action-btn" id="btn-place">ĐẶT (R-Click)</button>
    </div>

    <div id="hotbar">
        <div class="slot selected" data-block="1"><div style="width:20px; height:20px; background:#557a2b;"></div><span class="slot-label">Cỏ</span></div>
        <div class="slot" data-block="2"><div style="width:20px; height:20px; background:#866043;"></div><span class="slot-label">Đất</span></div>
        <div class="slot" data-block="3"><div style="width:20px; height:20px; background:#737373;"></div><span class="slot-label">Đá</span></div>
        <div class="slot" data-block="4"><div style="width:20px; height:20px; background:#a0764c;"></div><span class="slot-label">Gỗ</span></div>
        <div class="slot" data-block="5"><div style="width:20px; height:20px; background:#e7ca53;"></div><span class="slot-label">Vàng</span></div>
        <div class="slot" data-block="6"><div style="width:20px; height:20px; background:#318ca7;"></div><span class="slot-label">Kim Cương</span></div>
    </div>

    <script>
        // --- CẤU HÌNH BAN ĐẦU ---
        const container = document.getElementById('canvas-container');
        const instructions = document.getElementById('instructions');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x80a0ff); // Bầu trời xanh
        scene.fog = new THREE.FogExp2(0x80a0ff, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Ánh sáng
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(20, 40, 20);
        scene.add(directionalLight);

        // Biến điều khiển & Vật lý
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let playerRadius = 0.5;
        
        // Góc nhìn chuột (Mô phỏng PointerLock của ThreeJS cơ bản)
        let pitchObject = new THREE.Object3D();
        pitchObject.add(camera);
        let yawObject = new THREE.Object3D();
        yawObject.position.y = 10; // Chiều cao ban đầu của người chơi
        yawObject.add(pitchObject);
        scene.add(yawObject);

        // Quản lý khối (Blocks) và sinh thế giới
        const blockLength = 1;
        const blocksWorld = []; // Mảng chứa các khối để tương tác ngắm/đào
        let selectedBlockType = 1; // Mặc định là Cỏ

        // Màu sắc đại diện các loại block
        const blockColors = {
            1: 0x557a2b, // Cỏ (Đồng bằng)
            2: 0x866043, // Đất
            3: 0x737373, // Đá
            4: 0xa0764c, // Gỗ cây
            5: 0xe7ca53, // Quặng Vàng
            6: 0x318ca7, // Quặng Kim cương
            7: 0x156287, // Nước biển
            8: 0xdfd59e  // Cát đảo
        };

        // --- HỆ THỐNG PHÁT SINH THẾ GIỚI (BIOMES, HANG ĐỘNG) ---
        function createWorld() {
            const size = 30; // Kích thước bản đồ 30x30
            const geometry = new THREE.BoxGeometry(1, 1, 1);

            for (let x = -size; x < size; x++) {
                for (let z = -size; z < size; z++) {
                    
                    // Tạo địa hình uốn lượn bằng hàm Sin/Cos giả lập nhiễu độ cao
                    let height = Math.floor((Math.sin(x * 0.1) + Math.cos(z * 0.1)) * 3) + 5;
                    
                    // Phân chia BIOME
                    let isSea = (x > 12 || z > 12); // Biome Biển ở góc bản đồ
                    let isIsland = (x < -12 && z < -12); // Biome Đảo

                    if (isSea) height = 2; // Biển thì thấp xuống
                    if (isIsland) height = 4;

                    for (let y = 0; y <= height; y++) {
                        
                        // HỆ THỐNG HANG ĐỘNG GIẢ LẬP (Bỏ trống block nếu rơi vào thuật toán hang)
                        if (y > 0 && y < height && Math.sin(x*0.5) + Math.cos(y*0.5) + Math.sin(z*0.5) > 1.2) {
                            continue; // Tạo khoảng trống làm hang động
                        }

                        let blockType = 3; // Mặc định bên dưới là Đá (Stone)

                        if (isSea) {
                            blockType = (y === height) ? 7 : 2; // Mặt nước hoặc đất dưới biển
                        } else if (isIsland) {
                            blockType = (y === height) ? 8 : 2; // Cát trên đảo
                        } else {
                            // Biome Đồng bằng
                            if (y === height) blockType = 1; // Khối cỏ bề mặt
                            else if (y > height - 3) blockType = 2; // Đất bên dưới cỏ
                        }

                        // Ngẫu nhiên sinh QUẶNG trong lòng đất (y < height - 2)
                        if (blockType === 3 && y < 3) {
                            let rand = Math.random();
                            if (rand < 0.05) blockType = 6; // Kim cương
                            else if (rand < 0.15) blockType = 5; // Vàng
                        }

                        // Tạo Mesh block
                        const material = new THREE.MeshLambertMaterial({ color: blockColors[blockType] });
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.position.set(x, y, z);
                        mesh.userData = { type: blockType };
                        scene.add(mesh);
                        blocksWorld.push(mesh);
                    }

                    // SINH CÂY (Chỉ sinh trên đất đồng bằng hoặc cát đảo, ngẫu nhiên)
                    if (!isSea && Math.random() < 0.02) {
                        let treeY = height + 1;
                        // Thân cây (Gỗ)
                        for (let ty = 0; ty < 3; ty++) {
                            const mG = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({color: blockColors}));
                            mG.position.set(x, treeY + ty, z);
                            scene.add(mG);
                            blocksWorld.push(mG);
                        }
                        // Lá cây (Cỏ)
                        const mL = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({color: 0x2e5c1e}));
                        mL.position.set(x, treeY + 3, z);
                        scene.add(mL);
                        blocksWorld.push(mL);
                    }
                }
            }
        }
        createWorld();

        // --- SINH SINH VẬT VÀ QUÁI VẬT (MOB) ---
        const mobs = [];
        function spawnMob(x, z, color, name) {
            const mobGroup = new THREE.Group();
            
            // Thân mob
            const bodyGeo = new THREE.BoxGeometry(0.8, 0.6, 1.2);
            const bodyMat = new THREE.MeshLambertMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            mobGroup.add(body);

            // Đầu mob
            const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.set(0, 1.1, 0.4);
            mobGroup.add(head);

            mobGroup.position.set(x, 6, z);
            scene.add(mobGroup);
            mobs.push({ mesh: mobGroup, dir: Math.random() * Math.PI * 2, name: name });
        }

        // Sinh Thú lành (Đồng bằng / Đảo)
        spawnMob(2, 2, 0xffffff, 'Cừu');
        spawnMob(-2, 5, 0x5c4033, 'Bò');
        spawnMob(5, -2, 0xffc0cb, 'Heo');
        spawnMob(-5, -5, 0xffffff, 'Gà');

        // Sinh Quái vật (Zombie, Skeleton, Creeper)
        spawnMob(10, 10, 0x00ff00, 'Creeper');
        spawnMob(-10, 10, 0x3a5f0b, 'Zombie');
        spawnMob(10, -10, 0xd3d3d3, 'Skeleton');

        // --- CƠ CHẾ POINTER LOCK (KHÓA CHUỘT GÓC NHÌN THỨ NHẤT) ---
        instructions.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                instructions.style.display = 'none';
            } else {
                instructions.style.display = 'flex';
            }
        });

        // Xử lý quay chuột
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body) return;

            const movementX = e.movementX || 0;
            const movementY = e.movementY || 0;

            yawObject.rotation.y -= movementX * 0.002;
            pitchObject.rotation.x -= movementY * 0.002;

            // Giới hạn góc nhìn lên/xuống tránh lật ngược camera
            pitchObject.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, pitchObject.rotation.x));
        });

        // --- ĐIỀU KHIỂN BÀN PHÍM & CHỌN HOTBAR ---
        const onKeyDown = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': if (canJump) velocity.y += 8; canJump = false; break;
                case 'Digit1': selectSlot(0); break;
                case 'Digit2': selectSlot(1); break;
                case 'Digit3': selectSlot(2); break;
                case 'Digit4': selectSlot(3); break;
                case 'Digit5': selectSlot(4); break;
                case 'Digit6': selectSlot(5); break;
            }
        };

        const onKeyUp = (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // Hỗ trợ nút bấm UI (Cho người dùng lười bấm phím)
        setupUiBtn('btn-w', () => moveForward = true, () => moveForward = false);
        setupUiBtn('btn-a', () => moveLeft = true, () => moveLeft = false);
        setupUiBtn('btn-s', () => moveBackward = true, () => moveBackward = false);
        setupUiBtn('btn-d', () => moveRight = true, () => moveRight = false);

        function setupUiBtn(id, start, end) {
            const btn = document.getElementById(id);
            btn.addEventListener('mousedown', start);
            btn.addEventListener('mouseup', end);
            btn.addEventListener('touchstart', start);
            btn.addEventListener('touchend', end);
        }

        // Chọn ô trên Hotbar công cụ
        const slots = document.querySelectorAll('.slot');
        slots.forEach((slot, index) => {
            slot.addEventListener('click', () => selectSlot(index));
        });

        function selectSlot(index) {
            slots.forEach(s => s.classList.remove('selected'));
            slots[index].classList.add('selected');
            selectedBlockType = parseInt(slots[index].getAttribute('data-block'));
        }

        // --- CƠ CHẾ ĐÀO VÀ ĐẶT BLOCK (RAYCASTER) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Giữa màn hình khi khóa chuột

        function performAction(isPlacing) {
            // Định hướng tia bắn từ tâm camera ra trước
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(blocksWorld);

            if (intersects.length > 0 && intersects.distance < 6) { // Khoảng cách tương tác tối đa là 6 mét
                const hitBlock = intersects.object;

                if (isPlacing) {
                    // ĐẶT BLOCK: Tính toán tọa độ dựa trên Vector mặt tiếp xúc (Normal)
                    const normal = intersects.face.normal;
                    const newPos = hitBlock.position.clone().add(normal);

                    const geometry = new THREE.BoxGeometry(1, 1, 1);
                    const material = new THREE.MeshLambertMaterial({ color: blockColors[selectedBlockType] });
                    const newMesh = new THREE.Mesh(geometry, material);
                    newMesh.position.copy(newPos);
                    newMesh.userData = { type: selectedBlockType };

                    scene.add(newMesh);
                    blocksWorld.push(newMesh);
                } else {
                    // ĐÀO BLOCK: Xóa khỏi màn hình và mảng dữ liệu thế giới
                    scene.remove(hitBlock);
                    const index = blocksWorld.indexOf(hitBlock);
                    if (index > -1) blocksWorld.splice(index, 1);
                }
            }
        }

        // Bắt sự kiện Click chuột thật
        document.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement !== document.body) return;
            if (e.button === 0) performAction(false); // Chuột trái đào
            if (e.button === 2) performAction(true);  // Chuột phải đặt
        });

        // Bắt sự kiện nút UI Đào / Đặt trên màn hình
        document.getElementById('btn-dig').addEventListener('click', () => performAction(false));
        document.getElementById('btn-place').addEventListener('click', () => performAction(true));


        // --- VÒNG LẶP ĐỒ HỌA & VẬT LÝ (ANIMATION LOOP) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (document.pointerLockElement === document.body) {
                // Giảm tốc độ di chuyển do ma sát
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 2.5 * delta; // Trọng lực rơi tự do

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // Tính toán hướng đi theo góc quay của người chơi
                if (moveForward || moveBackward) velocity.z -= direction.z * 40.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 40.0 * delta;

                yawObject.translateX(velocity.x * delta);
                yawObject.translateY(velocity.y * delta);
                yawObject.translateZ(velocity.z * delta);

                // Va chạm mặt đất (Cơ chế nhảy / đứng vững đơn giản)
                if (yawObject.position.y < 7.5) { 
                    velocity.y = 0;
                    yawObject.position.y = 7.5;
                    canJump = true;
                }

                // DI CHUYỂN AI CHO QUÁI VẬT VÀ ĐỘNG VẬT
                mobs.forEach(mob => {
                    // Cho chúng di chuyển ngẫu nhiên chậm rãi quanh map
                    if(Math.random() < 0.02) mob.dir = Math.random() * Math.PI * 2;
                    mob.mesh.translateX(Math.sin(mob.dir) * delta * 0.5);
                    mob.mesh.translateZ(Math.cos(mob.dir) * delta * 0.5);
                });
            }

            renderer.render(scene, camera);
        }

        // Tự động căn chỉnh kích thước khi phóng to thu nhỏ trình duyệt
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
